name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 테스트 (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} 설정
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: 단위 테스트 실행
        run: |
          pytest tests/ -v \
            --cov=waterlevel_sim \
            --cov-report=term-missing \
            --cov-report=xml \
            --tb=short \
            -q

      - name: 커버리지 업로드 (Codecov)
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: 코드 품질 검사
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: flake8 설치
        run: pip install flake8

      - name: 린트 검사
        run: |
          # 심각한 오류만 검사 (E9: 구문오류, F63: 미정의 이름)
          flake8 waterlevel_sim/ --count --select=E9,F63,F7,F82 \
            --show-source --statistics

  app-check:
    name: Streamlit 앱 구문 검사
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          pip install streamlit

      - name: 앱 구문 검사
        run: |
          python -m py_compile app.py
          python -m py_compile "pages/1_🔵_시뮬레이션.py"
          python -m py_compile "pages/2_🟣_최적화.py"
          python -m py_compile "pages/3_🟢_검증.py"
          echo "모든 페이지 구문 검사 통과"

      - name: 핵심 임포트 테스트
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from waterlevel_sim import (DataLibrary, WaterLevelSimulator,
                                      FlowOptimizer, FlowRouter)
          from waterlevel_sim.npz_loader import load_demo, available_demos
          nc = load_demo('tesr')
          dl = DataLibrary('data/ParamSetforcxx.csv')
          from waterlevel_sim import WaterLevelSimulator
          res = WaterLevelSimulator(dl, nc.wl, nc.q_station).run()
          assert res.rmse_mean < 10.0
          print(f'임포트 및 실행 OK — RMSE={res.rmse_mean:.3f}m')
          "
